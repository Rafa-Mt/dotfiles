[manager]
keymap = [
	{ on = ["<Esc>"], run = "close", desc = "Exit the process" },
	{ on = ["q"], run = "close", desc = "Exit the process" },
	{ on = ["<C-q>"], run = "close --force", desc = "Force exit the process" },

	{ on = ["<Enter>"], run = "open", desc = "Open the selected file" },
	{ on = ["<C-n>"], run = "open --interactive", desc = "Open the selected file interactively" },

	{ on = ["l"], run = "open", desc = "Open the selected file" },
	{ on = ["h"], run = "back", desc = "Go back to the parent directory" },
	{ on = ["j"], run = "arrow 1", desc = "Move cursor down" },
	{ on = ["k"], run = "arrow -1", desc = "Move cursor up" },

	{ on = ["g", "g"], run = "arrow -99999999", desc = "Go to the top" },
	{ on = ["G"], run = "arrow 99999999", desc = "Go to the bottom" },

	{ on = ["~"], run = "cd ~", desc = "Go to the home directory" },
	{ on = ["<C-h>"], run = "cd --history=−1", desc = "Go to the previous directory" },
	{ on = ["<C-l>"], run = "cd --history=1", desc = "Go to the next directory" },

	{ on = ["<Space>"], run = "select --state=none", desc = "Toggle the current selection state" },
	{ on = ["v"], run = "visual_mode", desc = "Enter visual mode" },
	{ on = ["V"], run = "visual_mode --unset", desc = "Enter visual unset mode" },
	{ on = ["<C-a>"], run = "select_all --state=true", desc = "Select all files" },
	{ on = ["<C-r>"], run = "select_all --state=none", desc = "Deselect all files" },
	{ on = ["o"], run = "open --hover", desc = "Hover the selected file and open it" },

	{ on = ["y"], run = "yank", desc = "Copy the selected files" },
	{ on = ["x"], run = "yank --cut", desc = "Cut the selected files" },
	{ on = ["p"], run = "paste", desc = "Paste the copied/cut files" },
	{ on = ["P"], run = "paste --force", desc = "Paste the copied/cut files (overwrite)" },
	{ on = ["-"], run = "remove --force", desc = "Move the files to the trash" },
	{ on = ["."], run = "hidden toggle", desc = "Toggle the visibility of hidden files" },

	{ on = ["r"], run = "rename --hover", desc = "Hover the selected file and rename it" },
	{ on = [";"], run = "shell --interactive", desc = "Run a shell command interactively" },
	{ on = [":"], run = "shell --block --interactive", desc = "Run a shell command interactively (block)" },
	{ on = ["."], run = "hidden toggle", desc = "Toggle hidden files" },

	{ on = ["z"], run = "plugin zoxide", desc = "Jump to a directory via zoxide" },
	{ on = ["Z"], run = "plugin fzf", desc = "Jump to a file/directory via fzf" },
]

[input]
keymap = [
	{ on = ["<Esc>"], run = "close", desc = "Cancel input" },
	{ on = ["<Enter>"], run = "confirm", desc = "Confirm input" },
]

[select]
keymap = [
	{ on = ["<Esc>"], run = "close", desc = "Cancel selection" },
	{ on = ["<Enter>"], run = "close --confirm", desc = "Confirm selection" },
]

[completion]
keymap = [
	{ on = ["<Tab>"], run = "arrow 1", desc = "Next suggestion" },
	{ on = ["<S-Tab>"], run = "arrow -1", desc = "Previous suggestion" },
]
